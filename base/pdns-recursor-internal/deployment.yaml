apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdns-recursor-internal
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-recursor-internal
    app.kubernetes.io/component: recursor-internal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pdns-recursor-internal
      app.kubernetes.io/component: recursor-internal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pdns-recursor-internal
        app.kubernetes.io/component: recursor-internal
    spec:
      serviceAccountName: pdns
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pdns-recursor-internal
      securityContext:
        runAsNonRoot: true
        runAsUser: 953
        runAsGroup: 953
        fsGroup: 953
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: resolve-auth-ip
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              set -e
              echo "Resolving pdns-auth ClusterIP..."
              # busybox nslookup outputs "Address: x.x.x.x" for answers.
              # Use grep and cut instead of awk to be safe.
              AUTH_IP=$(nslookup pdns-auth.dns.svc.cluster.local 2>/dev/null \
                | grep "^Address:" \
                | tail -1 \
                | cut -d' ' -f2)
              if [ -z "$AUTH_IP" ]; then
                echo "ERROR: failed to resolve pdns-auth.dns.svc.cluster.local"
                nslookup pdns-auth.dns.svc.cluster.local || true
                exit 1
              fi
              echo "Resolved pdns-auth to ${AUTH_IP}"
              echo "example.com=${AUTH_IP}:5300" > /etc/powerdns/forward-zones.conf
              echo "Wrote forward-zones.conf:"
              cat /etc/powerdns/forward-zones.conf
          volumeMounts:
            - name: forward-zones
              mountPath: /etc/powerdns
      containers:
        - name: pdns-recursor-internal
          image: powerdns/pdns-recursor-50:5.0.4
          ports:
            - name: dns-udp
              containerPort: 5301
              protocol: UDP
            - name: dns-tcp
              containerPort: 5301
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/powerdns/recursor.conf
              subPath: recursor.conf
              readOnly: true
            - name: config
              mountPath: /etc/powerdns/pdns-recursor.lua
              subPath: pdns-recursor.lua
              readOnly: true
            - name: forward-zones
              mountPath: /etc/powerdns/forward-zones.conf
              subPath: forward-zones.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run/pdns-recursor
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - rec_control
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - rec_control
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: pdns-recursor-internal-config
        - name: forward-zones
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
