# The internal recursor is exposed via a LoadBalancer that listens on
# port 53 for both UDP and TCP. Network policy restricts access to
# on-system RFC 1918 source addresses only. This is the primary ingress
# point for internal DNS traffic as described in the architecture document.
apiVersion: v1
kind: Service
metadata:
  name: pdns-recursor-internal
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-recursor-internal
    app.kubernetes.io/component: recursor-internal
  annotations:
    # Preserve the source IP of DNS clients so that network policy
    # and ACLs in the recursor can enforce internal-only access.
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    # Replace with your load balancer annotation as appropriate,
    # e.g., for MetalLB: metallb.universe.tf/address-pool: internal-dns
spec:
  selector:
    app.kubernetes.io/name: pdns-recursor-internal
    app.kubernetes.io/component: recursor-internal
  type: LoadBalancer
  # Preserve client source IP for ACL enforcement in the recursor.
  externalTrafficPolicy: Local
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
