# The external recursor is exposed via a separate LoadBalancer from the
# internal recursor. Clients that need to resolve public IPs or GUAs are
# directed to this service's address by the system's resolver configuration.
# Network policy enforces that this service is only reachable from authorized
# on-system sources, not from arbitrary external clients.
apiVersion: v1
kind: Service
metadata:
  name: pdns-recursor-external
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-recursor-external
    app.kubernetes.io/component: recursor-external
  annotations:
    # Replace with your load balancer annotation as appropriate,
    # e.g., for MetalLB: metallb.universe.tf/address-pool: external-dns
spec:
  selector:
    app.kubernetes.io/name: pdns-recursor-external
    app.kubernetes.io/component: recursor-external
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
