apiVersion: v1
kind: ConfigMap
metadata:
  name: pdns-auth-config
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-auth
    app.kubernetes.io/component: authoritative
data:
  pdns.conf: |
    # --- Core settings ---
    daemon=no
    guardian=no
    setuid=pdns
    setgid=pdns
    local-address=0.0.0.0,::
    local-port=5300

    # --- Backend ---
    # gpgsql backend provides shared zone state across the HA pair
    launch=gpgsql
    gpgsql-host=${PDNS_DB_HOST}
    gpgsql-port=5432
    gpgsql-dbname=${PDNS_DB_NAME}
    gpgsql-user=${PDNS_DB_USER}
    gpgsql-password=${PDNS_DB_PASSWORD}
    gpgsql-dnssec=yes

    # --- DNSSEC ---
    # DNSSEC signing is enabled per-zone via pdnsutil; the authoritative
    # server will serve signed responses automatically once zones are signed.

    # --- Zone transfer (AXFR/IXFR) ---
    # Allow upstream anycast DNS servers to perform zone transfers.
    # The on-system DNS does not use delegation with upstream per requirements;
    # zone data is pushed via AXFR/IXFR instead.
    allow-axfr-ips=10.100.0.1
    # Notify upstream nameservers when zones are updated
    also-notify=10.100.0.1

    # --- API (used by automation/record management) ---
    api=yes
    api-key=${PDNS_API_KEY}
    webserver=yes
    webserver-address=0.0.0.0
    webserver-port=8081
    webserver-allow-from=10.0.0.0/8,127.0.0.0/8

    # --- Logging ---
    loglevel=4
    log-dns-queries=no
    log-dns-details=yes

    # --- Performance ---
    receiver-threads=4
    distributor-threads=4

    # --- SOA defaults ---
    default-soa-edit=INCEPTION-INCREMENT
    default-soa-edit-signed=INCEPTION-INCREMENT
