apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdns-auth
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-auth
    app.kubernetes.io/component: authoritative
spec:
  # Two replicas satisfy the HA pair requirement from the architecture doc.
  # Both replicas share zone state via the gpgsql backend.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pdns-auth
      app.kubernetes.io/component: authoritative
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pdns-auth
        app.kubernetes.io/component: authoritative
      annotations:
        checksum/config: "placeholder-replaced-by-kustomize-hash"
    spec:
      serviceAccountName: pdns
      # Spread replicas across nodes for true HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pdns-auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 953
        runAsGroup: 953
        fsGroup: 953
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Wait for the PostgreSQL backend to be available before starting
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $PDNS_DB_HOST 5432; do
                echo "Waiting for PostgreSQL at $PDNS_DB_HOST:5432..."
                sleep 5
              done
          envFrom:
            - secretRef:
                name: pdns-auth-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: pdns-auth
          image: powerdns/pdns-auth-48:4.8.4
          ports:
            - name: dns-udp
              containerPort: 5300
              protocol: UDP
            - name: dns-tcp
              containerPort: 5300
              protocol: TCP
            - name: webserver
              containerPort: 8081
              protocol: TCP
          envFrom:
            - secretRef:
                name: pdns-auth-secret
          volumeMounts:
            - name: config
              mountPath: /etc/powerdns/pdns.conf
              subPath: pdns.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/pdns
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/servers/localhost
              port: webserver
              httpHeaders:
                - name: X-API-Key
                  value: $(PDNS_API_KEY)
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/servers/localhost
              port: webserver
              httpHeaders:
                - name: X-API-Key
                  value: $(PDNS_API_KEY)
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: pdns-auth-config
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
