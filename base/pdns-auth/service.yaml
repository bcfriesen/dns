# The authoritative server is not exposed directly to clients. It is
# only reachable by the internal and external recursors, which forward
# to it at port 5300 on this ClusterIP service. AXFR/IXFR to upstream 
# is handled via a separate LoadBalancer or network policy as needed.
apiVersion: v1
kind: Service
metadata:
  name: pdns-auth
  namespace: dns
  labels:
    app.kubernetes.io/name: pdns-auth
    app.kubernetes.io/component: authoritative
spec:
  selector:
    app.kubernetes.io/name: pdns-auth
    app.kubernetes.io/component: authoritative
  type: ClusterIP
  ports:
    - name: dns-udp
      port: 5300
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 5300
      targetPort: dns-tcp
      protocol: TCP
    - name: webserver
      port: 8081
      targetPort: webserver
      protocol: TCP
