apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: DNS infrastructure managed by GitOps

  sourceRepos:
    - https://github.com/bcfriesen/dns.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: dns
    - server: https://kubernetes.default.svc
      namespace: argocd

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: batch
      kind: Job
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule

  syncWindows:
    - kind: allow
      schedule: "0 2 * * 1-5"
      duration: 4h
      applications:
        - dns
      manualSync: true
    - kind: allow
      schedule: "0 0 * * 6"
      duration: 8h
      applications:
        - dns
      manualSync: true

  roles:
    - name: dns-admin
      description: Full sync and management access for the dns application
      policies:
        - p, proj:dns:dns-admin, applications, *, dns/*, allow
      groups:
        - dns-admins
    - name: dns-readonly
      description: Read-only access for CI/CD diff jobs
      policies:
        - p, proj:dns:dns-readonly, applications, get, dns/*, allow
      groups:
        - dns-ci
